<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI客服助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-area input:focus {
            border-color: #667eea;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .input-area button:active {
            transform: translateY(0);
        }
        
        .upload-area {
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .upload-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        
        .upload-btn:hover {
            background: #e0e0e0;
        }
        
        .upload-status {
            font-size: 13px;
            color: #666;
        }
        
        .rule-reference {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .rule-reference h4 {
            margin: 0 0 5px 0;
            font-size: 13px;
            color: #667eea;
        }
        
        .rule-text {
            color: #555;
            line-height: 1.6;
            font-style: italic;
        }
        
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: pulse 1.5s infinite;
            margin: 0 2px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI客服助手</h1>
            <p>我可以帮您查询订单、创建订单等</p>
        </div>
        
        <div class="chat-area" id="chatArea"></div>
        
        <div class="upload-area">
            <input type="file" id="fileInput" accept=".pdf,.txt,.doc,.docx" onchange="uploadFile()" />
            <label for="fileInput" class="upload-btn">📎 上传规则文档</label>
            <span class="upload-status" id="uploadStatus"></span>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入您的问题..." />
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>
    
    <script>
        let sessionId = null;
        
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            const statusEl = document.getElementById('uploadStatus');
            statusEl.textContent = '上传中...';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('category', 'shipping-rules');
            
            fetch('/api/document/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    statusEl.textContent = '✓ ' + file.name + ' 上传成功';
                    addMessage('文档 "' + file.name + '" 已上传并向量化完成，现在可以查询相关规则了。', 'assistant');
                    setTimeout(() => {
                        statusEl.textContent = '';
                        fileInput.value = '';
                    }, 3000);
                } else {
                    statusEl.textContent = '✗ 上传失败';
                }
            })
            .catch(error => {
                statusEl.textContent = '✗ 上传失败: ' + error.message;
            });
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 显示加载状态
            const loadingId = 'loading-' + Date.now();
            addMessage('<span class="loading"></span><span class="loading"></span><span class="loading"></span>', 'assistant', loadingId);
            
            // 发送请求
            const params = new URLSearchParams();
            if (sessionId) params.append('sessionId', sessionId);
            params.append('message', message);
            
            fetch('/api/chat/message?' + params.toString(), {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                sessionId = data.data.sessionId;
                removeMessage(loadingId);
                
                let messageContent = data.data.message;
                
                // 如果有引用的规则，添加规则引用
                if (data.data.appliedRules && data.data.appliedRules.length > 0) {
                    messageContent += '<div class="rule-reference">';
                    messageContent += '<h4>📋 引用的规则原文：</h4>';
                    data.data.appliedRules.forEach((rule, index) => {
                        messageContent += '<div class="rule-text">"' + rule + '"</div>';
                        if (index < data.data.appliedRules.length - 1) {
                            messageContent += '<br>';
                        }
                    });
                    messageContent += '</div>';
                }
                
                addMessage(messageContent, 'assistant');
            })
            .catch(error => {
                removeMessage(loadingId);
                addMessage('抱歉，发生了错误: ' + error.message, 'assistant');
            });
        }
        
        function addMessage(content, role, id = null) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + role;
            if (id) messageDiv.id = id;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;
            
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeMessage(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }
        
        // 回车发送
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 初始化欢迎消息
        window.addEventListener('load', function() {
            addMessage('👋 您好！我是AI智能客服助手。我可以帮您：\n\n' +
                '📦 查询订单信息\n' +
                '✍️ 创建新订单\n' +
                '🚢 查询运输规则（支持智能判断）\n' +
                '📄 上传规则文档（自动向量化）\n\n' +
                '例如：\n' +
                '• "我要从北京邮寄苹果到美国，可以吗？"\n' +
                '• "查询订单ORD001"\n' +
                '• "创建订单，客户张三..."\n\n' +
                '您也可以上传运输规则文档，我会自动学习并回答相关问题。', 'assistant');
        });
    </script>
</body>
</html>
